<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1080" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#111226" />
    </marker>
    <marker id="arrowCyan" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#45b9d5" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="1080" fill="#FFFFFF" />

  <text x="800" y="45" text-anchor="middle" font-size="30" font-weight="bold" fill="#111226" letter-spacing="2">PROCESO COMERCIAL — CRM ADENTU</text>
  <text x="800" y="72" text-anchor="middle" font-size="16" fill="#45b9d5" font-style="italic">De la fuente de informacion a la Oportunidad comercial</text>

  <!-- ROW 1: FUENTES -->
  <text x="80" y="118" font-size="15" font-weight="bold" fill="#111226">FUENTES DE INFORMACION</text>
  <g font-size="14">
    <!-- Correo -->
    <rect x="60" y="130" width="190" height="60" rx="10" fill="#FFFFFF" stroke="#45b9d5" stroke-width="2"/>
    <text x="155" y="155" text-anchor="middle" font-weight="bold" fill="#111226">Correo</text>
    <text x="155" y="174" text-anchor="middle" font-size="11" fill="#333333">Gmail / Outlook sync</text>

    <!-- WhatsApp -->
    <rect x="270" y="130" width="190" height="60" rx="10" fill="#FFFFFF" stroke="#45b9d5" stroke-width="2"/>
    <text x="365" y="155" text-anchor="middle" font-weight="bold" fill="#111226">WhatsApp</text>
    <text x="365" y="174" text-anchor="middle" font-size="11" fill="#333333">Webhook Meta Business</text>

    <!-- Reuniones -->
    <rect x="480" y="130" width="190" height="60" rx="10" fill="#FFFFFF" stroke="#45b9d5" stroke-width="2"/>
    <text x="575" y="155" text-anchor="middle" font-weight="bold" fill="#111226">Reuniones</text>
    <text x="575" y="174" text-anchor="middle" font-size="11" fill="#333333">Google Calendar / Meet</text>

    <!-- LinkedIn -->
    <rect x="690" y="130" width="190" height="60" rx="10" fill="#FFFFFF" stroke="#45b9d5" stroke-width="2"/>
    <text x="785" y="155" text-anchor="middle" font-weight="bold" fill="#111226">LinkedIn</text>
    <text x="785" y="174" text-anchor="middle" font-size="11" fill="#333333">Captura de perfiles</text>

    <!-- Leads web -->
    <rect x="900" y="130" width="190" height="60" rx="10" fill="#FFFFFF" stroke="#45b9d5" stroke-width="2"/>
    <text x="995" y="155" text-anchor="middle" font-weight="bold" fill="#111226">Leads web</text>
    <text x="995" y="174" text-anchor="middle" font-size="11" fill="#333333">Formulario sitio ADENTU</text>

    <!-- Registro manual -->
    <rect x="1110" y="130" width="190" height="60" rx="10" fill="#FFFFFF" stroke="#45b9d5" stroke-width="2"/>
    <text x="1205" y="155" text-anchor="middle" font-weight="bold" fill="#111226">Registro manual</text>
    <text x="1205" y="174" text-anchor="middle" font-size="11" fill="#333333">Llamada, visita, reunion presencial</text>
  </g>

  <!-- arrows down to Interacciones -->
  <g stroke="#111226" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M155,190 L155,210 Q155,230 400,230"/>
    <path d="M365,190 L365,225 Q365,235 500,235"/>
    <path d="M575,190 L575,240"/>
    <path d="M785,190 L785,240"/>
    <path d="M995,190 L995,225 Q995,235 850,235"/>
    <path d="M1205,190 L1205,210 Q1205,230 950,230"/>
  </g>

  <!-- ROW 2: INTERACCIONES -->
  <rect x="400" y="240" width="450" height="80" rx="12" fill="#111226"/>
  <text x="625" y="270" text-anchor="middle" font-size="20" font-weight="bold" fill="#45b9d5">INTERACCION</text>
  <text x="625" y="295" text-anchor="middle" font-size="12.5" fill="#FFFFFF">Clasificacion automatica (IA) por canal, o registro manual</text>
  <text x="625" y="312" text-anchor="middle" font-size="11.5" fill="#FFFFFF">Se vincula a Empresa / Contacto / Oportunidad / Servicio</text>

  <!-- Interaccion -> Tarea -->
  <path d="M850,280 Q970,280 970,320" stroke="#111226" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <text x="980" y="290" font-size="11.5" fill="#333333">si tiene</text>
  <text x="980" y="303" font-size="11.5" fill="#333333">Proxima accion</text>

  <!-- ROW 3: TAREA -->
  <rect x="920" y="320" width="270" height="70" rx="12" fill="#FFFFFF" stroke="#111226" stroke-width="2.5"/>
  <text x="1055" y="350" text-anchor="middle" font-size="17" font-weight="bold" fill="#111226">TAREA</text>
  <text x="1055" y="370" text-anchor="middle" font-size="11.5" fill="#333333">Responsable, vencimiento y vinculo</text>

  <!-- Interaccion + Tarea -> Empresa/Contacto/Oportunidad -->
  <path d="M625,320 L625,440" stroke="#111226" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M1055,390 Q1055,440 950,440" stroke="#111226" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <!-- ROW 4: Empresa/Contacto + Oportunidad -->
  <rect x="380" y="450" width="280" height="75" rx="12" fill="#FFFFFF" stroke="#45b9d5" stroke-width="2.5"/>
  <text x="520" y="480" text-anchor="middle" font-size="16" font-weight="bold" fill="#111226">EMPRESA / CONTACTO</text>
  <text x="520" y="500" text-anchor="middle" font-size="11.5" fill="#333333">Existente o creado en la captura</text>

  <path d="M660,487 L780,487" stroke="#111226" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="780" y="450" width="300" height="75" rx="12" fill="#111226"/>
  <text x="930" y="480" text-anchor="middle" font-size="16" font-weight="bold" fill="#45b9d5">OPORTUNIDAD</text>
  <text x="930" y="500" text-anchor="middle" font-size="11.5" fill="#FFFFFF">Existente (se actualiza) o Nueva (se crea)</text>

  <!-- Oportunidad -> Pipeline / Dashboard -->
  <path d="M860,525 L860,580" stroke="#111226" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <path d="M1000,525 L1000,580" stroke="#111226" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

  <rect x="730" y="590" width="260" height="70" rx="12" fill="#FFFFFF" stroke="#111226" stroke-width="2.5"/>
  <text x="860" y="620" text-anchor="middle" font-size="15" font-weight="bold" fill="#111226">PIPELINE COMERCIAL</text>
  <text x="860" y="640" text-anchor="middle" font-size="11" fill="#333333">Drag &amp; drop por etapa, probabilidad</text>

  <rect x="1000" y="590" width="260" height="70" rx="12" fill="#FFFFFF" stroke="#111226" stroke-width="2.5"/>
  <text x="1130" y="620" text-anchor="middle" font-size="15" font-weight="bold" fill="#111226">DASHBOARD</text>
  <text x="1130" y="640" text-anchor="middle" font-size="11" fill="#333333">KPIs, pipeline abierto, alertas</text>

  <!-- Inteligencia Comercial side box -->
  <rect x="80" y="430" width="260" height="110" rx="12" fill="#45b9d5"/>
  <text x="210" y="462" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#111226">INTELIGENCIA</text>
  <text x="210" y="482" text-anchor="middle" font-size="15.5" font-weight="bold" fill="#111226">COMERCIAL (IA)</text>
  <text x="210" y="505" text-anchor="middle" font-size="11" fill="#111226">Analiza Interaccion u Oportunidad</text>
  <text x="210" y="521" text-anchor="middle" font-size="11" fill="#111226">y propone cambios a aprobar</text>

  <path d="M340,460 L400,290" stroke="#45b9d5" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowCyan)"/>
  <path d="M340,520 L340,560 L900,560 L900,525" stroke="#45b9d5" stroke-width="2.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrowCyan)"/>

  <!-- Legend -->
  <g font-size="12.5">
    <rect x="80" y="700" width="22" height="14" fill="#111226"/>
    <text x="112" y="712" fill="#111226">Registro / proceso del CRM</text>
    <rect x="80" y="725" width="22" height="14" fill="#FFFFFF" stroke="#45b9d5" stroke-width="2"/>
    <text x="112" y="737" fill="#111226">Fuente de captura externa</text>
    <rect x="80" y="750" width="22" height="14" fill="#45b9d5"/>
    <text x="112" y="762" fill="#111226">Modulo de analisis IA</text>
    <line x1="80" y1="780" x2="102" y2="780" stroke="#45b9d5" stroke-width="2.5" stroke-dasharray="6,4"/>
    <text x="112" y="784" fill="#111226">Flujo de analisis / sugerencia IA</text>
  </g>

  <text x="800" y="1050" text-anchor="middle" font-size="12" fill="#999999">ADENTU — CRM Comercial · Manual de Usuario</text>
</svg>
